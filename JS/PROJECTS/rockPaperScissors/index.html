<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>ROCK PAPER SCISSORS</h1>
    <div class="choices">
      <button onclick="onPlayerChoice('ROCK')">✊</button>
      <button onclick="onPlayerChoice('PAPER')">🫳</button>
      <button onclick="onPlayerChoice('SCISSORS')">🤞</button>
    </div>

    <div id="choicesDisplay">
      <div>
        PLAYER:
        <span id="playerChoice"></span>
      </div>
      <div>
        COMPUTER:
        <span id="computerChoice"></span>
      </div>
    </div>
    <div id="resultDisplay"></div>
    <div class="scoreDisplay">
      Player Score:
      <span id="playerScoreDisplay">0</span>
    </div>

    <div class="scoreDisplay">
      Computer Score:
      <span id="computerScoreDisplay">0</span>
    </div>

    <div class="scoreSum">
      RESULT:
      <span id="scoreSumDisplay">zero fight</span>
    </div>
    <div class="reverseAction">
      <button onclick="undo()"><< UNDO</button>
      <button onclick="redo()">REDO >></button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
